<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>HR Registration | CloudHR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="assets/css/global.css">

<style>

body{

background:#f4f7fb;
font-family:Poppins,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;

}

.card{

width:450px;
padding:35px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.15);

}

.logo{

text-align:center;
font-size:30px;
font-weight:700;
color:#2563EB;
margin-bottom:25px;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">

<i class="fa-solid fa-cloud"></i>

CloudHR

</div>

<h4 class="text-center mb-4">

HR Registration

</h4>

<div class="mb-3">
    <label>Name</label>
    <input
        type="text"
        id="name"
        class="form-control"
        autocomplete="off">
</div>

<div class="mb-3">
    <label>Email</label>
    <input
        type="email"
        id="email"
        class="form-control"
        autocomplete="off">
</div>

<div class="mb-3">
    <label>Username</label>
    <input
        type="text"
        id="username"
        class="form-control"
        autocomplete="off">
</div>

<div class="mb-4">
    <label>Password</label>
    <input
        type="password"
        id="password"
        class="form-control"
        autocomplete="new-password">
</div>

<div class="d-grid">

<button
class="btn btn-success"
id="registerBtn">

Register

</button>

</div>

<p
id="message"
class="text-center mt-3"></p>

<p class="text-center mt-4">

Already have an account?

<a href="login.html">

Login

</a>

</p>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/register.js"></script>

</body>

</html>
