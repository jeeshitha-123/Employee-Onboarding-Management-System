<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Employee | CloudHR</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="assets/css/global.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/components.css">

</head>

<body>

<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>

<i class="fa-solid fa-user-plus"></i>

Add Employee

</h3>

</div>

<div class="card-body">

    <div class="mb-3">
<label>Employee ID</label>
<input type="text" id="employeeId" class="form-control">
</div>

<div class="mb-3">
<label>Name</label>
<input type="text" id="name" class="form-control">
</div>

<div class="mb-3">
<label>Email</label>
<input type="email" id="email" class="form-control">
</div>

<div class="mb-3">
<label>Department</label>
<select id="department" class="form-select">

<option>HR</option>
<option>IT</option>
<option>Finance</option>
<option>Marketing</option>
<option>Operations</option>

</select>
</div>

<div class="mb-3">
<label>Manager</label>
<input type="text" id="manager" class="form-control">
</div>

<div class="mb-3">
<label>Joining Date</label>
<input type="date" id="joiningDate" class="form-control">
</div>

<div class="mb-3">
<label>Status</label>
<select id="status" class="form-select">

<option>Pending</option>
<option>Approved</option>

</select>
</div>

<button
id="saveEmployee"
class="btn btn-success">

Save Employee

</button>

<a
href="employees.html"
class="btn btn-secondary">

Cancel

</a>

<p id="message" class="mt-3"></p>

</div>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/add-employee.js"></script>

</body>

</html>
