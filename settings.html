<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | CloudHR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="assets/css/global.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/dashboard.css">

</head>

<body>

<div class="dashboard-layout">

<aside class="sidebar">

<div class="logo">

<i class="fa-solid fa-cloud"></i>

CloudHR

</div>

<ul>

<li><a href="dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>

<li><a href="employees.html"><i class="fa-solid fa-users"></i> Employees</a></li>

<li><a href="documents.html"><i class="fa-solid fa-folder"></i> Documents</a></li>

<li><a href="reports.html"><i class="fa-solid fa-chart-column"></i> Reports</a></li>

<li class="active"><a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a></li>
<li>

                <a href="profile.html">

                    <i class="fa-solid fa-user"></i>

                    My Profile

                </a>

            </li>
<li>

<a href="#" onclick="logout()">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

</li>

</ul>

</aside>

<main class="main-content">

<h2 class="mb-4">

Settings

</h2>

<div class="card shadow-sm">

<div class="card-body">

<div class="mb-3">

<label class="form-label">

Name

</label>

<input
type="text"
id="name"
class="form-control"
placeholder="Enter name"
value="">

</div>

<div class="mb-3">

<label class="form-label">

Email

</label>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter email"
value="">

</div>

<div class="mb-3">

<label class="form-label">

Username

</label>

<input
type="text"
id="username"
class="form-control"
placeholder="Enter username"
autocomplete="off"
value="">

</div>

<div class="mb-3">

<label class="form-label">

New Password

</label>

<input
type="password"
id="password"
class="form-control"
placeholder="Enter new password"
autocomplete="new-password"
value="">

</div>

<button

class="btn btn-primary"

id="saveBtn">

Save Changes

</button>

<p

id="message"

class="mt-3"></p>

</div>

</div>

</main>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/settings.js"></script>

<script>

function logout(){

    sessionStorage.clear();

    window.location.href="index.html";

}

</script>

</body>

</html>
