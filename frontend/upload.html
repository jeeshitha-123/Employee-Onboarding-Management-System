<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Employee Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <h1>Upload Employee Document</h1>

    <form id="uploadForm">

        <label>Employee ID</label><br>
        <input type="text" id="employeeId" placeholder="EMP001" required><br><br>

        <label>Select Document</label><br>
        <input type="file" id="document" required><br><br>

        <button type="submit">Upload</button>

    </form>

    <p id="message"></p>

    <script src="js/upload.js"></script>

</body>
</html>
